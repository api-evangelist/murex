naftiko: 1.0.0-alpha2
info:
  label: Murex MX.3 Trading API — Orders
  description: 'Murex MX.3 Trading API — Orders. 5 operations. Lead operation: Murex List orders. Self-contained Naftiko capability
    covering one Murex business surface.'
  tags:
  - Murex
  - Orders
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    MUREX_API_KEY: MUREX_API_KEY
capability:
  consumes:
  - type: http
    namespace: trading-orders
    baseUri: https://api.murex.com/v1/trading
    description: Murex MX.3 Trading API — Orders business capability. Self-contained, no shared references.
    resources:
    - name: orders
      path: /orders
      operations:
      - name: listorders
        method: GET
        description: Murex List orders
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: status
          in: query
          type: string
          description: Filter by order status
        - name: fromDate
          in: query
          type: string
          description: Start date for order search
        - name: toDate
          in: query
          type: string
          description: End date for order search
      - name: createorder
        method: POST
        description: Murex Create an order
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    - name: orders-orderId
      path: /orders/{orderId}
      operations:
      - name: getorder
        method: GET
        description: Murex Get an order
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: updateorder
        method: PUT
        description: Murex Update an order
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    - name: orders-orderId-cancel
      path: /orders/{orderId}/cancel
      operations:
      - name: cancelorder
        method: POST
        description: Murex Cancel an order
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    authentication:
      type: bearer
      token: '{{env.MUREX_API_KEY}}'
  exposes:
  - type: rest
    namespace: trading-orders-rest
    port: 8080
    description: REST adapter for Murex MX.3 Trading API — Orders. One Spectral-compliant resource per consumed operation,
      prefixed with /v1.
    resources:
    - path: /v1/orders
      name: orders
      description: REST surface for orders.
      operations:
      - method: GET
        name: listorders
        description: Murex List orders
        call: trading-orders.listorders
        with:
          status: rest.status
          fromDate: rest.fromDate
          toDate: rest.toDate
        outputParameters:
        - type: object
          mapping: $.
      - method: POST
        name: createorder
        description: Murex Create an order
        call: trading-orders.createorder
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/orders/{orderid}
      name: orders-orderid
      description: REST surface for orders-orderId.
      operations:
      - method: GET
        name: getorder
        description: Murex Get an order
        call: trading-orders.getorder
        outputParameters:
        - type: object
          mapping: $.
      - method: PUT
        name: updateorder
        description: Murex Update an order
        call: trading-orders.updateorder
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/orders/{orderid}/cancel
      name: orders-orderid-cancel
      description: REST surface for orders-orderId-cancel.
      operations:
      - method: POST
        name: cancelorder
        description: Murex Cancel an order
        call: trading-orders.cancelorder
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: trading-orders-mcp
    port: 9090
    transport: http
    description: MCP adapter for Murex MX.3 Trading API — Orders. One tool per consumed operation, routed inline through this
      capability's consumes block.
    tools:
    - name: murex-list-orders
      description: Murex List orders
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: trading-orders.listorders
      with:
        status: tools.status
        fromDate: tools.fromDate
        toDate: tools.toDate
      outputParameters:
      - type: object
        mapping: $.
    - name: murex-create-order
      description: Murex Create an order
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: trading-orders.createorder
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: murex-get-order
      description: Murex Get an order
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: trading-orders.getorder
      outputParameters:
      - type: object
        mapping: $.
    - name: murex-update-order
      description: Murex Update an order
      hints:
        readOnly: false
        destructive: false
        idempotent: true
      call: trading-orders.updateorder
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: murex-cancel-order
      description: Murex Cancel an order
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: trading-orders.cancelorder
      outputParameters:
      - type: object
        mapping: $.
