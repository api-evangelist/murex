naftiko: 1.0.0-alpha2
info:
  label: Murex MX.3 Risk API — Limits
  description: 'Murex MX.3 Risk API — Limits. 2 operations. Lead operation: Murex List risk limits. Self-contained Naftiko
    capability covering one Murex business surface.'
  tags:
  - Murex
  - Limits
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    MUREX_API_KEY: MUREX_API_KEY
capability:
  consumes:
  - type: http
    namespace: risk-limits
    baseUri: https://api.murex.com/v1/risk
    description: Murex MX.3 Risk API — Limits business capability. Self-contained, no shared references.
    resources:
    - name: limits
      path: /limits
      operations:
      - name: listlimits
        method: GET
        description: Murex List risk limits
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: status
          in: query
          type: string
          description: Filter by limit status
    - name: limits-limitId
      path: /limits/{limitId}
      operations:
      - name: getlimit
        method: GET
        description: Murex Get a risk limit
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: limitId
          in: path
          type: string
          description: Risk limit identifier
          required: true
    authentication:
      type: bearer
      token: '{{env.MUREX_API_KEY}}'
  exposes:
  - type: rest
    namespace: risk-limits-rest
    port: 8080
    description: REST adapter for Murex MX.3 Risk API — Limits. One Spectral-compliant resource per consumed operation, prefixed
      with /v1.
    resources:
    - path: /v1/limits
      name: limits
      description: REST surface for limits.
      operations:
      - method: GET
        name: listlimits
        description: Murex List risk limits
        call: risk-limits.listlimits
        with:
          status: rest.status
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/limits/{limitid}
      name: limits-limitid
      description: REST surface for limits-limitId.
      operations:
      - method: GET
        name: getlimit
        description: Murex Get a risk limit
        call: risk-limits.getlimit
        with:
          limitId: rest.limitId
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: risk-limits-mcp
    port: 9090
    transport: http
    description: MCP adapter for Murex MX.3 Risk API — Limits. One tool per consumed operation, routed inline through this
      capability's consumes block.
    tools:
    - name: murex-list-risk-limits
      description: Murex List risk limits
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: risk-limits.listlimits
      with:
        status: tools.status
      outputParameters:
      - type: object
        mapping: $.
    - name: murex-get-risk-limit
      description: Murex Get a risk limit
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: risk-limits.getlimit
      with:
        limitId: tools.limitId
      outputParameters:
      - type: object
        mapping: $.
