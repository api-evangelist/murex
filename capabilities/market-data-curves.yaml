naftiko: 1.0.0-alpha2
info:
  label: Murex MX.3 Market Data API — Curves
  description: 'Murex MX.3 Market Data API — Curves. 2 operations. Lead operation: Murex List available curves. Self-contained
    Naftiko capability covering one Murex business surface.'
  tags:
  - Murex
  - Curves
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    MUREX_API_KEY: MUREX_API_KEY
capability:
  consumes:
  - type: http
    namespace: market-data-curves
    baseUri: https://api.murex.com/v1/marketdata
    description: Murex MX.3 Market Data API — Curves business capability. Self-contained, no shared references.
    resources:
    - name: curves
      path: /curves
      operations:
      - name: listcurves
        method: GET
        description: Murex List available curves
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: currency
          in: query
          type: string
          description: Filter by currency
        - name: curveType
          in: query
          type: string
          description: Filter by curve type
    - name: curves-curveId
      path: /curves/{curveId}
      operations:
      - name: getcurve
        method: GET
        description: Murex Get curve data
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: curveId
          in: path
          type: string
          description: Curve unique identifier
          required: true
        - name: asOfDate
          in: query
          type: string
          description: Curve valuation date
    authentication:
      type: bearer
      token: '{{env.MUREX_API_KEY}}'
  exposes:
  - type: rest
    namespace: market-data-curves-rest
    port: 8080
    description: REST adapter for Murex MX.3 Market Data API — Curves. One Spectral-compliant resource per consumed operation,
      prefixed with /v1.
    resources:
    - path: /v1/curves
      name: curves
      description: REST surface for curves.
      operations:
      - method: GET
        name: listcurves
        description: Murex List available curves
        call: market-data-curves.listcurves
        with:
          currency: rest.currency
          curveType: rest.curveType
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/curves/{curveid}
      name: curves-curveid
      description: REST surface for curves-curveId.
      operations:
      - method: GET
        name: getcurve
        description: Murex Get curve data
        call: market-data-curves.getcurve
        with:
          curveId: rest.curveId
          asOfDate: rest.asOfDate
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: market-data-curves-mcp
    port: 9090
    transport: http
    description: MCP adapter for Murex MX.3 Market Data API — Curves. One tool per consumed operation, routed inline through
      this capability's consumes block.
    tools:
    - name: murex-list-available-curves
      description: Murex List available curves
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: market-data-curves.listcurves
      with:
        currency: tools.currency
        curveType: tools.curveType
      outputParameters:
      - type: object
        mapping: $.
    - name: murex-get-curve-data
      description: Murex Get curve data
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: market-data-curves.getcurve
      with:
        curveId: tools.curveId
        asOfDate: tools.asOfDate
      outputParameters:
      - type: object
        mapping: $.
