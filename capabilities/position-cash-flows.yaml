naftiko: 1.0.0-alpha2
info:
  label: Murex MX.3 Position API — Cash Flows
  description: 'Murex MX.3 Position API — Cash Flows. 1 operations. Lead operation: Murex List cash flows. Self-contained
    Naftiko capability covering one Murex business surface.'
  tags:
  - Murex
  - Cash Flows
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    MUREX_API_KEY: MUREX_API_KEY
capability:
  consumes:
  - type: http
    namespace: position-cash-flows
    baseUri: https://api.murex.com/v1/position
    description: Murex MX.3 Position API — Cash Flows business capability. Self-contained, no shared references.
    resources:
    - name: cashflows
      path: /cashflows
      operations:
      - name: listcashflows
        method: GET
        description: Murex List cash flows
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: fromDate
          in: query
          type: string
          description: Start date for cash flow period
        - name: toDate
          in: query
          type: string
          description: End date for cash flow period
        - name: currency
          in: query
          type: string
          description: Filter by currency
        - name: type
          in: query
          type: string
          description: Cash flow type filter
    authentication:
      type: bearer
      token: '{{env.MUREX_API_KEY}}'
  exposes:
  - type: rest
    namespace: position-cash-flows-rest
    port: 8080
    description: REST adapter for Murex MX.3 Position API — Cash Flows. One Spectral-compliant resource per consumed operation,
      prefixed with /v1.
    resources:
    - path: /v1/cashflows
      name: cashflows
      description: REST surface for cashflows.
      operations:
      - method: GET
        name: listcashflows
        description: Murex List cash flows
        call: position-cash-flows.listcashflows
        with:
          fromDate: rest.fromDate
          toDate: rest.toDate
          currency: rest.currency
          type: rest.type
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: position-cash-flows-mcp
    port: 9090
    transport: http
    description: MCP adapter for Murex MX.3 Position API — Cash Flows. One tool per consumed operation, routed inline through
      this capability's consumes block.
    tools:
    - name: murex-list-cash-flows
      description: Murex List cash flows
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: position-cash-flows.listcashflows
      with:
        fromDate: tools.fromDate
        toDate: tools.toDate
        currency: tools.currency
        type: tools.type
      outputParameters:
      - type: object
        mapping: $.
