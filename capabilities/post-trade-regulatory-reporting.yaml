naftiko: 1.0.0-alpha2
info:
  label: Murex MX.3 Post-Trade API — Regulatory Reporting
  description: 'Murex MX.3 Post-Trade API — Regulatory Reporting. 2 operations. Lead operation: Murex List regulatory reports.
    Self-contained Naftiko capability covering one Murex business surface.'
  tags:
  - Murex
  - Regulatory Reporting
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    MUREX_API_KEY: MUREX_API_KEY
capability:
  consumes:
  - type: http
    namespace: post-trade-regulatory-reporting
    baseUri: https://api.murex.com/v1/posttrade
    description: Murex MX.3 Post-Trade API — Regulatory Reporting business capability. Self-contained, no shared references.
    resources:
    - name: regulatory-reports
      path: /regulatory/reports
      operations:
      - name: listregulatoryreports
        method: GET
        description: Murex List regulatory reports
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: regime
          in: query
          type: string
          description: Regulatory reporting regime
        - name: status
          in: query
          type: string
          description: Report submission status
        - name: fromDate
          in: query
          type: string
          description: Start date
        - name: toDate
          in: query
          type: string
          description: End date
    - name: regulatory-reports-reportId
      path: /regulatory/reports/{reportId}
      operations:
      - name: getregulatoryreport
        method: GET
        description: Murex Get a regulatory report
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: reportId
          in: path
          type: string
          description: Regulatory report identifier
          required: true
    authentication:
      type: bearer
      token: '{{env.MUREX_API_KEY}}'
  exposes:
  - type: rest
    namespace: post-trade-regulatory-reporting-rest
    port: 8080
    description: REST adapter for Murex MX.3 Post-Trade API — Regulatory Reporting. One Spectral-compliant resource per consumed
      operation, prefixed with /v1.
    resources:
    - path: /v1/regulatory/reports
      name: regulatory-reports
      description: REST surface for regulatory-reports.
      operations:
      - method: GET
        name: listregulatoryreports
        description: Murex List regulatory reports
        call: post-trade-regulatory-reporting.listregulatoryreports
        with:
          regime: rest.regime
          status: rest.status
          fromDate: rest.fromDate
          toDate: rest.toDate
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/regulatory/reports/{reportid}
      name: regulatory-reports-reportid
      description: REST surface for regulatory-reports-reportId.
      operations:
      - method: GET
        name: getregulatoryreport
        description: Murex Get a regulatory report
        call: post-trade-regulatory-reporting.getregulatoryreport
        with:
          reportId: rest.reportId
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: post-trade-regulatory-reporting-mcp
    port: 9090
    transport: http
    description: MCP adapter for Murex MX.3 Post-Trade API — Regulatory Reporting. One tool per consumed operation, routed
      inline through this capability's consumes block.
    tools:
    - name: murex-list-regulatory-reports
      description: Murex List regulatory reports
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: post-trade-regulatory-reporting.listregulatoryreports
      with:
        regime: tools.regime
        status: tools.status
        fromDate: tools.fromDate
        toDate: tools.toDate
      outputParameters:
      - type: object
        mapping: $.
    - name: murex-get-regulatory-report
      description: Murex Get a regulatory report
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: post-trade-regulatory-reporting.getregulatoryreport
      with:
        reportId: tools.reportId
      outputParameters:
      - type: object
        mapping: $.
