naftiko: 1.0.0-alpha2
info:
  label: Murex MX.3 Market Data API — Quotes
  description: 'Murex MX.3 Market Data API — Quotes. 2 operations. Lead operation: Murex Get market quotes. Self-contained
    Naftiko capability covering one Murex business surface.'
  tags:
  - Murex
  - Quotes
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    MUREX_API_KEY: MUREX_API_KEY
capability:
  consumes:
  - type: http
    namespace: market-data-quotes
    baseUri: https://api.murex.com/v1/marketdata
    description: Murex MX.3 Market Data API — Quotes business capability. Self-contained, no shared references.
    resources:
    - name: quotes
      path: /quotes
      operations:
      - name: getquotes
        method: GET
        description: Murex Get market quotes
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: instrumentIds
          in: query
          type: string
          description: Comma-separated list of instrument identifiers
          required: true
        - name: fields
          in: query
          type: string
          description: Comma-separated list of quote fields to return
    - name: quotes-history
      path: /quotes/history
      operations:
      - name: getquotehistory
        method: GET
        description: Murex Get historical quotes
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: instrumentId
          in: query
          type: string
          description: Instrument identifier
          required: true
        - name: fromDate
          in: query
          type: string
          description: Start date
          required: true
        - name: toDate
          in: query
          type: string
          description: End date
          required: true
        - name: frequency
          in: query
          type: string
          description: Data frequency
    authentication:
      type: bearer
      token: '{{env.MUREX_API_KEY}}'
  exposes:
  - type: rest
    namespace: market-data-quotes-rest
    port: 8080
    description: REST adapter for Murex MX.3 Market Data API — Quotes. One Spectral-compliant resource per consumed operation,
      prefixed with /v1.
    resources:
    - path: /v1/quotes
      name: quotes
      description: REST surface for quotes.
      operations:
      - method: GET
        name: getquotes
        description: Murex Get market quotes
        call: market-data-quotes.getquotes
        with:
          instrumentIds: rest.instrumentIds
          fields: rest.fields
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/quotes/history
      name: quotes-history
      description: REST surface for quotes-history.
      operations:
      - method: GET
        name: getquotehistory
        description: Murex Get historical quotes
        call: market-data-quotes.getquotehistory
        with:
          instrumentId: rest.instrumentId
          fromDate: rest.fromDate
          toDate: rest.toDate
          frequency: rest.frequency
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: market-data-quotes-mcp
    port: 9090
    transport: http
    description: MCP adapter for Murex MX.3 Market Data API — Quotes. One tool per consumed operation, routed inline through
      this capability's consumes block.
    tools:
    - name: murex-get-market-quotes
      description: Murex Get market quotes
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: market-data-quotes.getquotes
      with:
        instrumentIds: tools.instrumentIds
        fields: tools.fields
      outputParameters:
      - type: object
        mapping: $.
    - name: murex-get-historical-quotes
      description: Murex Get historical quotes
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: market-data-quotes.getquotehistory
      with:
        instrumentId: tools.instrumentId
        fromDate: tools.fromDate
        toDate: tools.toDate
        frequency: tools.frequency
      outputParameters:
      - type: object
        mapping: $.
