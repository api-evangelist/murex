naftiko: 1.0.0-alpha2
info:
  label: Murex MX.3 Trading API — Trades
  description: 'Murex MX.3 Trading API — Trades. 2 operations. Lead operation: Murex List trades. Self-contained Naftiko capability
    covering one Murex business surface.'
  tags:
  - Murex
  - Trades
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    MUREX_API_KEY: MUREX_API_KEY
capability:
  consumes:
  - type: http
    namespace: trading-trades
    baseUri: https://api.murex.com/v1/trading
    description: Murex MX.3 Trading API — Trades business capability. Self-contained, no shared references.
    resources:
    - name: trades
      path: /trades
      operations:
      - name: listtrades
        method: GET
        description: Murex List trades
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: counterpartyId
          in: query
          type: string
          description: Filter by counterparty identifier
        - name: tradeDate
          in: query
          type: string
          description: Filter by trade date
    - name: trades-tradeId
      path: /trades/{tradeId}
      operations:
      - name: gettrade
        method: GET
        description: Murex Get a trade
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    authentication:
      type: bearer
      token: '{{env.MUREX_API_KEY}}'
  exposes:
  - type: rest
    namespace: trading-trades-rest
    port: 8080
    description: REST adapter for Murex MX.3 Trading API — Trades. One Spectral-compliant resource per consumed operation,
      prefixed with /v1.
    resources:
    - path: /v1/trades
      name: trades
      description: REST surface for trades.
      operations:
      - method: GET
        name: listtrades
        description: Murex List trades
        call: trading-trades.listtrades
        with:
          counterpartyId: rest.counterpartyId
          tradeDate: rest.tradeDate
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/trades/{tradeid}
      name: trades-tradeid
      description: REST surface for trades-tradeId.
      operations:
      - method: GET
        name: gettrade
        description: Murex Get a trade
        call: trading-trades.gettrade
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: trading-trades-mcp
    port: 9090
    transport: http
    description: MCP adapter for Murex MX.3 Trading API — Trades. One tool per consumed operation, routed inline through this
      capability's consumes block.
    tools:
    - name: murex-list-trades
      description: Murex List trades
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: trading-trades.listtrades
      with:
        counterpartyId: tools.counterpartyId
        tradeDate: tools.tradeDate
      outputParameters:
      - type: object
        mapping: $.
    - name: murex-get-trade
      description: Murex Get a trade
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: trading-trades.gettrade
      outputParameters:
      - type: object
        mapping: $.
