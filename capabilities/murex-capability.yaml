      call: murex.getfxratehistory
      with:
        currencyPair: tools.currencyPair
        fromDate: tools.fromDate
        toDate: tools.toDate
      inputParameters:
      - name: currencyPair
        type: string
        description: Currency pair (e.g., EURUSD)
        required: true
      - name: fromDate
        type: string
        description: fromDate
        required: true
      - name: toDate
        type: string
        description: toDate
        required: true
      outputParameters:
      - type: object
        mapping: $.
    - name: listcalendars
      description: Murex List market calendars
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: murex.listcalendars
      with:
        country: tools.country
      inputParameters:
      - name: country
        type: string
        description: Filter by country code
      outputParameters:
      - type: object
        mapping: $.
    - name: listcurrencies
      description: Murex List currencies
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: murex.listcurrencies
      outputParameters:
      - type: object
        mapping: $.
binds:
- namespace: env
  keys:
    MUREX_TOKEN: MUREX_TOKEN
