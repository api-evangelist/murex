        type: string
        description: Comma-separated list of instrument identifiers
        required: true
      - name: fields
        type: string
        description: Comma-separated list of quote fields to return
      outputParameters:
      - type: object
        mapping: $.
    - name: getquotehistory
      description: Murex Get historical quotes
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: murex.getquotehistory
      with:
        instrumentId: tools.instrumentId
        fromDate: tools.fromDate
        toDate: tools.toDate
        frequency: tools.frequency
      inputParameters:
      - name: instrumentId
        type: string
        description: Instrument identifier
        required: true
      - name: fromDate
        type: string
        description: Start date
        required: true
      - name: toDate
        type: string
        description: End date
        required: true
      - name: frequency
        type: string
        description: Data frequency
      outputParameters:
      - type: object
        mapping: $.
    - name: listcurves
      description: Murex List available curves
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: murex.listcurves
      with:
        currency: tools.currency
        curveType: tools.curveType
      inputParameters:
      - name: currency
        type: string
        description: Filter by currency
      - name: curveType
        type: string
        description: Filter by curve type
      outputParameters:
      - type: object
        mapping: $.
    - name: getcurve
      description: Murex Get curve data
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: murex.getcurve
      with:
        curveId: tools.curveId
        asOfDate: tools.asOfDate
      inputParameters:
      - name: curveId
        type: string
        description: Curve unique identifier
        required: true
      - name: asOfDate
        type: string
        description: Curve valuation date
      outputParameters:
      - type: object
        mapping: $.
    - name: listvolatilitysurfaces
      description: Murex List volatility surfaces
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: murex.listvolatilitysurfaces
      with:
        underlying: tools.underlying
